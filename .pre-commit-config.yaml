repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        args: [src/]
        pass_filenames: false
        additional_dependencies:
          - typer>=0.15
          - rich>=13.0
          - mcp>=1.0
          - pydantic>=2.0
          - platformdirs>=4.0
          - sarif-om>=1.0
          - httpx>=0.28
