# MCPRadar Regression Gate — Ground Truth Corpus
# Each entry defines expected findings at the capability/CVE/CWE level.
# Assertions are capability-based, not literal finding counts, to avoid brittleness.

targets:
  # Layer 1: Pinned Vulnerable Versions (CVE regression)
  # NOTE: Pre-patch versions (before 2025.7.x) use old MCP SDK that doesn't
  # expose tool schemas in list_tools. Static scan findings are unavailable —
  # CVE checks via OSV.dev are the primary assertion.
  - server: "@modelcontextprotocol/server-filesystem"
    package: {ecosystem: "npm", name: "@modelcontextprotocol/server-filesystem"}
    pinned_version: "2025.3.28"
    scan_command: "npx -y @modelcontextprotocol/server-filesystem@2025.3.28 /tmp"
    transport: "stdio"
    expected:
      min_findings: 0
      min_critical_or_high: 0
      cve_ids: ["CVE-2025-53110", "CVE-2025-53109"]
      cwe_ids: ["CWE-22", "CWE-59"]
      max_grade: "A"
      notes: >-
        Pre-patch version with known CVEs (path traversal, symlink bypass).
        Old MCP SDK — empty tool schemas means no static findings possible.
        CVE presence verified via OSV.dev API.

  # Layer 2: Latest Version (design-level findings — still risky)
  - server: "@modelcontextprotocol/server-filesystem"
    package: {ecosystem: "npm", name: "@modelcontextprotocol/server-filesystem"}
    pinned_version: "latest"
    scan_command: "npx -y @modelcontextprotocol/server-filesystem /tmp"
    transport: "stdio"
    expected:
      min_findings: 10
      rules_triggered: ["R113", "R114"]
      max_grade: "F"
      notes: >-
        Latest version patched the CVE-level path traversal but still has
        design-level risks: path params lack pattern/format constraints (R113),
        and many string inputs have no validation constraints at all (R114).

  # Layer 3: Negative Control (FP calibration)
  - server: "benign-echo-server"
    package: null
    pinned_version: null
    scan_command: "python tests/fixtures/benign_server/echo_server.py"
    transport: "stdio"
    expected:
      max_critical: 0
      max_findings: 4
      grade: "A"
      notes: "Minimal clean MCP server. Any CRITICAL finding = FP regression."
