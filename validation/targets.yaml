# MCPRadar real-world validation targets
# Run: python validation/run_validation.py

servers:
  - name: "@modelcontextprotocol/server-filesystem"
    scan: "npx -y @modelcontextprotocol/server-filesystem /tmp"
    transport: stdio
    notes: "Official. File tools (read_file, write_file, edit_file). Expect R105 (file name + network desc), possibly R001."

  - name: "@modelcontextprotocol/server-github"
    scan: "npx -y @modelcontextprotocol/server-github"
    transport: stdio
    notes: "Official. GitHub API (create_issue, search_repos). Expect mostly clean."

  - name: "@modelcontextprotocol/server-postgres"
    scan: "npx -y @modelcontextprotocol/server-postgres localhost:5432"
    transport: stdio
    notes: "Official. SQL query tool. May trigger R005 (sql/query params) or R105."

  - name: "@modelcontextprotocol/server-brave-search"
    scan: "npx -y @modelcontextprotocol/server-brave-search"
    transport: stdio
    notes: "Official. Web search. Should be clean."

  - name: "@modelcontextprotocol/server-puppeteer"
    scan: "npx -y @modelcontextprotocol/server-puppeteer"
    transport: stdio
    notes: "Official. Browser automation (navigate, screenshot, click). May trigger R001 (eval/exec)."

  - name: "@modelcontextprotocol/server-slack"
    scan: "npx -y @modelcontextprotocol/server-slack"
    transport: stdio
    notes: "Official. Slack API (send_message, list_channels). Should be clean."

  - name: "@anthropic/server-sequential-thinking"
    scan: "npx -y @modelcontextprotocol/server-sequential-thinking"
    transport: stdio
    notes: "Community. Reasoning tool. Should be clean."

  - name: "@modelcontextprotocol/server-memory"
    scan: "npx -y @modelcontextprotocol/server-memory"
    transport: stdio
    notes: "Official. Knowledge graph memory. Should be clean."

  - name: "@modelcontextprotocol/server-everything"
    scan: "npx -y @modelcontextprotocol/server-everything"
    transport: stdio
    notes: "Official reference. Echo, add, etc. Should be clean — baseline benchmark."

  - name: "demo/malicious_server.py (baseline)"
    scan: "python demo/malicious_server.py"
    transport: stdio
    notes: "Project's own malicious demo. Should trigger all 6 rules — baseline test."
