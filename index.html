<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCPRadar — MCP Server Security Leaderboard</title>
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --dim: #8b949e;
    --red: #da3633;
    --orange: #d2991d;
    --green: #238636;
    --blue: #58a6ff;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font:14px/1.6 -apple-system,BlinkMacSystemFont,sans-serif; max-width:960px; margin:0 auto; padding:40px 20px; }
  h1 { font-size:28px; margin-bottom:8px; }
  h1 span { color:var(--red); }
  .sub { color:var(--dim); margin-bottom:32px; }
  table { width:100%; border-collapse:collapse; }
  th { text-align:left; padding:10px 12px; border-bottom:1px solid var(--border); color:var(--dim); font-weight:600; font-size:12px; text-transform:uppercase; letter-spacing:.5px; }
  td { padding:10px 12px; border-bottom:1px solid var(--border); }
  tr:hover td { background:var(--card); }
  .server { color:var(--blue); }
  .clean { color:var(--green); }
  .warn { color:var(--orange); }
  .critical { color:var(--red); }
  .pending { color:var(--dim); }
  .footer { margin-top:40px; color:var(--dim); font-size:12px; text-align:center; }
  .footer a { color:var(--blue); }
</style>
</head>
<body>
<h1><span>MCPRadar</span> Security Leaderboard</h1>
<p class="sub">
  Public security scores for popular MCP servers. Updated weekly.
  <a href="https://github.com/yatuk/mcpradar">What is MCPRadar?</a>
</p>

<table>
<thead>
<tr>
  <th>Server</th>
  <th>Status</th>
  <th>Tools</th>
  <th>Findings</th>
  <th>Critical</th>
  <th>High</th>
  <th>Medium</th>
  <th>Low</th>
</tr>
</thead>
<tbody id="tbody">
<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--dim)">Loading data…</td></tr>
</tbody>
</table>

<p class="footer">
  Generated by <a href="https://github.com/yatuk/mcpradar">MCPRadar</a> v1.0.0-rc1.
</p>

<script>
fetch("data.json")
  .then(r => r.json())
  .then(data => {
    const tbody = document.getElementById("tbody");
    if (!data.length) {
      tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--dim)">No scans yet. Run validation pipeline.</td></tr>';
      return;
    }
    tbody.innerHTML = data.map(row => {
      const statusClass = row.status === "clean" ? "clean" : row.status === "pending" ? "pending" : "warn";
      const statusIcon = row.status === "clean" ? "✓" : row.status === "pending" ? "⏳" : "⚠";
      return '<tr>' +
        '<td class="server">' + row.server + '</td>' +
        '<td class="' + statusClass + '">' + statusIcon + ' ' + (row.status || "—") + '</td>' +
        '<td>' + (row.tools || 0) + '</td>' +
        '<td>' + (row.findings || 0) + '</td>' +
        '<td class="critical">' + (row.critical || 0) + '</td>' +
        '<td class="warn">' + (row.high || 0) + '</td>' +
        '<td>' + (row.medium || 0) + '</td>' +
        '<td>' + (row.low || 0) + '</td>' +
      '</tr>';
    }).join("");
  })
  .catch(() => {
    document.getElementById("tbody").innerHTML =
      '<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--dim)">Could not load data.</td></tr>';
  });
</script>
</body>
</html>
