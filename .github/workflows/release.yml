name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: Build & Publish
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: write
      attestations: write
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Verify tag matches package version
        shell: bash
        run: |
          VERSION=$(uv run python -c 'from mcpradar import __version__; print(__version__)')
          test "${GITHUB_REF_NAME}" = "v${VERSION}"

      - name: Build
        run: uv build

      - name: Verify wheel installation
        shell: bash
        run: |
          uv venv .release-venv
          uv pip install --python .release-venv/bin/python dist/*.whl
          .release-venv/bin/mcpradar --version

      - name: Generate release SBOM
        run: uv run mcpradar sbom . --output dist/mcpradar.cdx.json

      - name: Attest release artifacts
        uses: actions/attest@v4
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz

      - name: Attest wheel SBOM
        uses: actions/attest@v4
        with:
          subject-path: dist/*.whl
          sbom-path: dist/mcpradar.cdx.json

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

      - name: Extract changelog
        id: changelog
        run: |
          awk '/^## \[/{p++; if(p==2) exit} p==1' CHANGELOG.md > /tmp/release_notes.md
          echo "notes_file=/tmp/release_notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release_notes.md
          files: dist/*
          generate_release_notes: false
