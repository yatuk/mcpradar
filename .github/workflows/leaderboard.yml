name: Update Leaderboard

on:
  schedule:
    - cron: "0 8 * * 1"  # every Monday at 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: uv sync

      # Scoring calibration gate — a broken scoring model (positive control not
      # F, benign not A, exec server graded A) must block publishing. Offline;
      # runs before any scan/generate step, so a red gate stops the deploy.
      - name: Scoring calibration gate
        run: uv run pytest tests/test_scoring_calibration.py tests/test_capability.py tests/test_enumeration.py -q

      - name: Fetch MCP Registry
        run: python -m mcpradar registry fetch --limit 100

      - name: Run validation scans
        run: python validation/run_validation.py --timeout 300
        continue-on-error: true

      - name: Enrich with dependency CVEs + source findings
        run: python -m mcpradar leaderboard enrich
        continue-on-error: true

      - name: Generate leaderboard data
        run: python -m mcpradar leaderboard generate

      - name: Sync to docs root
        run: |
          cp docs/leaderboard/index.html docs/index.html
          cp docs/leaderboard/data.json docs/data.json
          cp docs/leaderboard/servers.json docs/servers.json
          mkdir -p docs/badges
          cp -r docs/leaderboard/badges/* docs/badges/

      - name: Commit updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/leaderboard/data.json docs/data.json docs/index.html docs/servers.json validation/results/
          git diff --staged --quiet || git commit -m "chore: update leaderboard [skip ci]"
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/leaderboard
          destination_dir: .
          keep_files: true
