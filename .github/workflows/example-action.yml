name: MCPRadar Security Scan

on:
  schedule:
    - cron: "0 6 * * *"  # daily at 06:00 UTC
  workflow_dispatch:
    inputs:
      server:
        description: "MCP server URL to scan"
        required: true
        default: "http://localhost:8080"

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MCPRadar
        run: pip install mcpradar

      - name: Scan MCP server
        run: |
          mcpradar scan "${{ inputs.server || 'http://localhost:8080' }}" \
            --format sarif -o results.sarif

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcpradar-results
          path: results.sarif
