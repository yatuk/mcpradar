# MCPRadar Security Scan
# Drop this into .github/workflows/mcpradar.yml to scan your MCP servers.
# Findings appear in Security → Code Scanning.
name: MCPRadar Security Scan

on:
  schedule:
    - cron: "0 6 * * *"  # daily at 06:00 UTC
  workflow_dispatch:
    inputs:
      target:
        description: "MCP server (URL or 'npm exec ...' command)"
        required: true
        default: "http://localhost:8080"
      transport:
        description: "Transport type"
        required: true
        default: "http"
        type: choice
        options:
          - http
          - sse
          - stdio

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MCPRadar
        run: pip install mcpradar

      - name: Scan MCP server
        run: |
          mcpradar scan "${{ inputs.target }}" \
            -t "${{ inputs.transport }}" \
            --format sarif -o results.sarif

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcpradar-results
          path: results.sarif
