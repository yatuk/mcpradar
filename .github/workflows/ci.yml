name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - run: uv sync --group dev || uv sync --extra dev || uv sync

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Ruff lint
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy src/

  test:
    name: Test (${{ matrix.python }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python }}

      - run: uv sync --group dev || uv sync --extra dev || uv sync

      - name: Run tests
        run: >
          uv run pytest -m "not e2e and not network and not slow"
          --cov=src/mcpradar
          --cov-report=term-missing
          --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: matrix.python == '3.12' && matrix.os == 'ubuntu-latest'
        with:
          files: coverage.xml

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Build wheel
        run: uv build

  regression-gate:
    name: Regression Gate (CVE Corpus)
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: uv sync --group dev || uv sync --extra dev || uv sync

      - name: Run regression gate (non-network)
        run: uv run pytest tests/test_regression_gate.py -v -m "not network and not slow"

      - name: Run regression gate (network + slow)
        run: uv run pytest tests/test_regression_gate.py -v -m "network or slow"
        continue-on-error: false
        timeout-minutes: 15
